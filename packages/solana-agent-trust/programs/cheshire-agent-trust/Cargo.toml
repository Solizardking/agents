[package]
name = "cheshire-agent-trust"
version = "0.1.0"
description = "Solana-native reputation and validation registry for Cheshire agent identities"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "cheshire_agent_trust"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = { version = "0.30.1", features = ["init-if-needed"] }
mpl-core = { version = "=0.7.2", features = ["anchor"] }
solana-program = "=1.18.26"
